# LAWIM_V2 Nginx reverse proxy foundation
#
# This file is a skeleton for the shared reverse proxy contract.
# It is intended to be mounted as /etc/nginx/conf.d/default.conf.

upstream lawim_app {
    server app:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    server_tokens off;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    ssl_certificate /etc/nginx/certs/lawim.crt;
    ssl_certificate_key /etc/nginx/certs/lawim.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        proxy_pass http://lawim_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_redirect off;
    }

    # Static assets can be wired later by mounting a read-only volume.
    # location /assets/ {
    #     alias /var/www/lawim/assets/;
    #     try_files $uri =404;
    #     access_log off;
    #     expires 7d;
    # }
}
