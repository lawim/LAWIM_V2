version: "3.9"

# Production profile contract for LAWIM_V2.
#
# This overlay captures the locked-down runtime posture. It keeps the stack
# minimal, externalizes secrets and avoids development-only shortcuts.

x-lawim-profile-contract:
  profile: production
  purpose: locked-down runtime
  environment_contract:
    APP_ENV: production
    STACK_PROFILE: production
    LOG_LEVEL: info
    PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    SECRET_PROVIDER: ${SECRET_PROVIDER:-external}
  operating_rules:
    - no debug helpers
    - no repository secrets
    - only durable, explicitly named volumes
