version: "3.9"

# Development profile contract for LAWIM_V2.
#
# This overlay documents the local-first runtime posture. It keeps debug
# defaults explicit and reserves bind mounts for later service tickets.

x-lawim-profile-contract:
  profile: development
  purpose: local iteration and debugging
  environment_contract:
    APP_ENV: development
    STACK_PROFILE: development
    LOG_LEVEL: debug
    PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    SECRET_PROVIDER: ${SECRET_PROVIDER:-external}
  operating_rules:
    - bind mounts and hot reload are allowed when actual services are introduced
    - writable scratch space is acceptable only in this profile
    - debug-oriented ports and tools stay out of staging and production
