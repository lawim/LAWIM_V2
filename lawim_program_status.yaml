  origin: git@github-lawim:lawim/LAWIM_V2.git

architecture:
  paradigm: project_centric_event_driven
  source_of_truth: ProjectProfile
  decision_authority: ProjectBrain
  execution_authority: ActionExecutionEngine
  llm_business_decisions_allowed: false
  channel_independent_runtime: true
  v2_must_remain_operational: true
  shadow_migration_required: true

