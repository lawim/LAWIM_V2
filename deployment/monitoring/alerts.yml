groups:
  - name: lawim_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate ({{ $value | humanizePercentage }})"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency (p95 > 2s)"

      - alert: ProviderUnavailable
        expr: up{job="ai_provider"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AI provider {{ $labels.provider }} is unavailable"

      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="OPEN"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is OPEN"

      - alert: HighAICost
        expr: ai_cost_estimate_total > 1000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "AI cost estimate > 1000 units"
