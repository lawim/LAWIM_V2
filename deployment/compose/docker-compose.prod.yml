version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: lawim/v3:${LAWIM_VERSION:-latest}
    container_name: lawim-app
    restart: unless-stopped
    ports:
      - "${LAWIM_PORT:-3000}:3000"
    env_file:
      - /home/abel/.config/lawim/.env.production
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      LROS_AI_INTELLIGENCE_ENABLED: "${LROS_AI_INTELLIGENCE_ENABLED:-false}"
      LROS_AI_EXTRACTION_ENABLED: "${LROS_AI_EXTRACTION_ENABLED:-false}"
      LROS_AI_RESPONSE_WRITER_ENABLED: "${LROS_AI_RESPONSE_WRITER_ENABLED:-false}"
      LROS_AI_SHADOW_MODE: "${LROS_AI_SHADOW_MODE:-true}"
      LROS_AI_PROVIDER_CALLS_ENABLED: "${LROS_AI_PROVIDER_CALLS_ENABLED:-false}"
      LROS_AI_BUDGET_MONTHLY_CENTS: "${LROS_AI_BUDGET_MONTHLY_CENTS:-0}"
      LROS_INTERACTION_GATEWAY_ENABLED: "${LROS_INTERACTION_GATEWAY_ENABLED:-false}"
      LROS_WHATSAPP_ADAPTER_ENABLED: "${LROS_WHATSAPP_ADAPTER_ENABLED:-false}"
      LROS_TELEGRAM_ADAPTER_ENABLED: "${LROS_TELEGRAM_ADAPTER_ENABLED:-false}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    volumes:
      - runtime_data:/app/data/runtime
    networks:
      - lawim-network

  db:
    image: postgres:16-alpine
    container_name: lawim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lawim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawim}
      POSTGRES_DB: ${POSTGRES_DB:-lawim_v3}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lawim}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - lawim-network

  redis:
    image: redis:7-alpine
    container_name: lawim-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - lawim-network

  prometheus:
    image: prom/prometheus:latest
    container_name: lawim-prometheus
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    logging: *default-logging
    networks:
      - lawim-network

  grafana:
    image: grafana/grafana:latest
    container_name: lawim-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    logging: *default-logging
    networks:
      - lawim-network

  nginx:
    image: nginx:alpine
    container_name: lawim-nginx
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    logging: *default-logging
    networks:
      - lawim-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  runtime_data:

networks:
  lawim-network:
    driver: bridge
