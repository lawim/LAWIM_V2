version: '3.9'

services:
  # Frontend - React SPA (Production)
  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.frontend
    container_name: lawim-frontend-prod
    environment:
      NODE_ENV: production
      VITE_LAWIM_API_URL: https://api.lawim.app
      VITE_LAWIM_USE_MOCKS: "false"
    networks:
      - lawim-network
    depends_on:
      - backend
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

  # Backend - FastAPI (Production)
  backend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
    container_name: lawim-backend-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
      LOG_LEVEL: warn
      WORKERS: 8
    networks:
      - lawim-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '4'
          memory: 2048M
        reservations:
          cpus: '2'
          memory: 1024M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

  # PostgreSQL Database (Production HA)
  postgres:
    image: postgres:15-alpine
    container_name: lawim-postgres-prod
    environment:
      POSTGRES_USER: lawim
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lawim
      POSTGRES_INITDB_ARGS: "--max_connections=1000 --shared_buffers=256MB --effective_cache_size=1GB --maintenance_work_mem=64MB --checkpoint_completion_target=0.9 --wal_buffers=16MB --default_statistics_target=100 --random_page_cost=1.1 --effective_io_concurrency=200 --work_mem=262kB --min_wal_size=2GB --max_wal_size=8GB --max_worker_processes=4 --max_parallel_workers_per_gather=2 --max_parallel_workers=4"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./deployment/backup/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./deployment/backup/postgresql.conf:/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawim -d lawim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lawim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2048M
        reservations:
          cpus: '2'
          memory: 1024M

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: lawim-redis-prod
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfilename "appendonly.aof"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_prod:/data
    networks:
      - lawim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '1'
          memory: 1024M

  # Celery Worker (Production - Scaled)
  worker:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.worker
    container_name: lawim-worker-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      CELERY_WORKER_CONCURRENCY: 8
    networks:
      - lawim-network
    depends_on:
      - redis
      - postgres
    restart: always
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '4'
          memory: 1024M
        reservations:
          cpus: '2'
          memory: 512M

  # Celery Beat Scheduler (Production)
  scheduler:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.scheduler
    container_name: lawim-scheduler-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    networks:
      - lawim-network
    depends_on:
      - redis
      - postgres
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Brain Service (Production)
  brain:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.brain
    container_name: lawim-brain-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2048M

  # Agents Service (Production)
  agents:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.agents
    container_name: lawim-agents-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '4'
          memory: 2048M

  # Knowledge Service (Production)
  knowledge:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.knowledge
    container_name: lawim-knowledge-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2048M

  # Communication Service (Production)
  communication:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.communication
    container_name: lawim-communication-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2048M

  # Campay Payment Service (Production)
  campay:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.campay
    container_name: lawim-campay-prod
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      CAMPAY_API_KEY: ${CAMPAY_API_KEY}
      CAMPAY_API_SECRET: ${CAMPAY_API_SECRET}
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 1024M

  # Nginx Reverse Proxy (Production)
  nginx:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.nginx
    container_name: lawim-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - lawim-network
    depends_on:
      - frontend
      - backend
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  nginx_cache:
    driver: local

networks:
  lawim-network:
    driver: bridge
