version: '3.9'

services:
  # Frontend - React SPA
  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.frontend
    container_name: lawim-frontend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      VITE_LAWIM_API_URL: http://localhost:8000
      VITE_LAWIM_USE_MOCKS: "false"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - lawim-network
    depends_on:
      - backend
    restart: unless-stopped

  # Backend - FastAPI
  backend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
    container_name: lawim-backend-dev
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-key-change-in-production
      ENVIRONMENT: development
      GREEN_API_API_URL: ${GREEN_API_API_URL:-}
      GREEN_API_MEDIA_URL: ${GREEN_API_MEDIA_URL:-}
      GREEN_API_ID_INSTANCE: ${GREEN_API_ID_INSTANCE:-}
      GREEN_API_TOKEN_INSTANCE: ${GREEN_API_TOKEN_INSTANCE:-}
      GREEN_API_WEBHOOK_SECRET: ${GREEN_API_WEBHOOK_SECRET:-}
      GREEN_API_WEBHOOK_URL: ${GREEN_API_WEBHOOK_URL:-}
      GREEN_API_PHONE: ${GREEN_API_PHONE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_PRIMARY_API_KEY: ${GEMINI_PRIMARY_API_KEY:-}
      GEMINI_PRIMARY_MODEL: ${GEMINI_PRIMARY_MODEL:-gemini-3.5-flash}
      GEMINI_SECONDARY_API_KEY: ${GEMINI_SECONDARY_API_KEY:-}
      GEMINI_SECONDARY_MODEL: ${GEMINI_SECONDARY_MODEL:-gemini-2.5-flash}
      AI_ORCHESTRATOR_ENABLED: ${AI_ORCHESTRATOR_ENABLED:-false}
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-deepseek}
      AI_COMPLEX_PROVIDER: ${AI_COMPLEX_PROVIDER:-openai}
      AI_FALLBACK_CHAIN: ${AI_FALLBACK_CHAIN:-deepseek,openai,gemini_primary,gemini_secondary,internal}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-30}
      AI_TOTAL_TIMEOUT_SECONDS: ${AI_TOTAL_TIMEOUT_SECONDS:-75}
      AI_MAX_RETRIES_PER_PROVIDER: ${AI_MAX_RETRIES_PER_PROVIDER:-1}
      AI_CIRCUIT_BREAKER_ENABLED: ${AI_CIRCUIT_BREAKER_ENABLED:-true}
      AI_RESPONSE_VALIDATION_ENABLED: ${AI_RESPONSE_VALIDATION_ENABLED:-true}
      AI_ALLOW_PROVIDER_RETRY: ${AI_ALLOW_PROVIDER_RETRY:-false}
      AI_COMPLEX_ROUTING_ENABLED: ${AI_COMPLEX_ROUTING_ENABLED:-true}
      AI_EXPENSIVE_MODEL_REQUIRES_COMPLEXITY: ${AI_EXPENSIVE_MODEL_REQUIRES_COMPLEXITY:-true}
      AI_MAX_CONTEXT_MESSAGES: ${AI_MAX_CONTEXT_MESSAGES:-20}
      AI_CONTEXT_SUMMARY_ENABLED: ${AI_CONTEXT_SUMMARY_ENABLED:-true}
      AI_CONTEXT_REDACTION_ENABLED: ${AI_CONTEXT_REDACTION_ENABLED:-true}
      AI_DAILY_BUDGET_LIMIT: ${AI_DAILY_BUDGET_LIMIT:-}
      AI_MONTHLY_BUDGET_LIMIT: ${AI_MONTHLY_BUDGET_LIMIT:-}
      AI_MAX_COST_PER_REQUEST: ${AI_MAX_COST_PER_REQUEST:-}
      AI_MAX_COST_PER_CONVERSATION: ${AI_MAX_COST_PER_CONVERSATION:-}
      COMMUNICATION_FALLBACK_ENABLED: ${COMMUNICATION_FALLBACK_ENABLED:-true}
      WHATSAPP_FALLBACK_ENABLED: ${WHATSAPP_FALLBACK_ENABLED:-true}
      TELEGRAM_FALLBACK_ENABLED: ${TELEGRAM_FALLBACK_ENABLED:-true}
      FALLBACK_WHEN_AI_UNCONFIGURED: ${FALLBACK_WHEN_AI_UNCONFIGURED:-true}
      FALLBACK_WHEN_AI_ERROR: ${FALLBACK_WHEN_AI_ERROR:-true}
      FALLBACK_WHEN_NO_ANSWER: ${FALLBACK_WHEN_NO_ANSWER:-true}
      FALLBACK_ESCALATE_TO_HUMAN: ${FALLBACK_ESCALATE_TO_HUMAN:-true}
      AI_LEARNING_ENABLED: ${AI_LEARNING_ENABLED:-true}
      AI_LEARNING_AUTO_PUBLISH: ${AI_LEARNING_AUTO_PUBLISH:-false}
      AI_LEARNING_REQUIRES_HUMAN_APPROVAL: ${AI_LEARNING_REQUIRES_HUMAN_APPROVAL:-true}
      HUMAN_ESCALATION_ENABLED: ${HUMAN_ESCALATION_ENABLED:-true}
      HUMAN_ESCALATION_AFTER_FALLBACK_COUNT: ${HUMAN_ESCALATION_AFTER_FALLBACK_COUNT:-2}
      HUMAN_ESCALATION_ON_USER_REQUEST: ${HUMAN_ESCALATION_ON_USER_REQUEST:-true}
      HUMAN_ESCALATION_ON_ALL_PROVIDERS_FAILED: ${HUMAN_ESCALATION_ON_ALL_PROVIDERS_FAILED:-true}
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lawim-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lawim
      POSTGRES_PASSWORD: lawim_dev
      POSTGRES_DB: lawim_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawim -d lawim_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lawim-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lawim-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_dev:/data
    networks:
      - lawim-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.worker
    container_name: lawim-worker-dev
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Celery Beat Scheduler
  scheduler:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.scheduler
    container_name: lawim-scheduler-dev
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Brain Service
  brain:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.brain
    container_name: lawim-brain-dev
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Agents Service
  agents:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.agents
    container_name: lawim-agents-dev
    ports:
      - "8002:8002"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Knowledge Service
  knowledge:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.knowledge
    container_name: lawim-knowledge-dev
    ports:
      - "8003:8003"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Communication Service
  communication:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.communication
    container_name: lawim-communication-dev
    ports:
      - "8004:8004"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Campay Payment Service
  campay:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.campay
    container_name: lawim-campay-dev
    ports:
      - "8005:8005"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:lawim_dev@postgres:5432/lawim_dev
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./code:/app/lawim_v2
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  lawim-network:
    driver: bridge
