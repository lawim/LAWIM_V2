version: '3.9'

services:
  # Frontend - React SPA (Staging)
  frontend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.frontend
    container_name: lawim-frontend-staging
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VITE_LAWIM_API_URL: https://api-staging.lawim.app
      VITE_LAWIM_USE_MOCKS: "false"
    networks:
      - lawim-network
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

  # Backend - FastAPI (Staging)
  backend:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
    container_name: lawim-backend-staging
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      LAWIM_VAULT_KEY: ${LAWIM_VAULT_KEY:-}
      ENVIRONMENT: staging
      LOG_LEVEL: info
      GREEN_API_API_URL: ${GREEN_API_API_URL:-}
      GREEN_API_MEDIA_URL: ${GREEN_API_MEDIA_URL:-}
      GREEN_API_ID_INSTANCE: ${GREEN_API_ID_INSTANCE:-}
      GREEN_API_TOKEN_INSTANCE: ${GREEN_API_TOKEN_INSTANCE:-}
      GREEN_API_WEBHOOK_SECRET: ${GREEN_API_WEBHOOK_SECRET:-}
      GREEN_API_WEBHOOK_URL: ${GREEN_API_WEBHOOK_URL:-}
      GREEN_API_PHONE: ${GREEN_API_PHONE:-}
      LAWIM_WHATSAPP_NUMBER: ${LAWIM_WHATSAPP_NUMBER:-}
      WHATSAPP_PUBLIC_NUMBER: ${WHATSAPP_PUBLIC_NUMBER:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_PRIMARY_API_KEY: ${GEMINI_PRIMARY_API_KEY:-}
      GEMINI_PRIMARY_MODEL: ${GEMINI_PRIMARY_MODEL:-gemini-3.5-flash}
      GEMINI_SECONDARY_API_KEY: ${GEMINI_SECONDARY_API_KEY:-}
      GEMINI_SECONDARY_MODEL: ${GEMINI_SECONDARY_MODEL:-gemini-2.5-flash}
      AI_ORCHESTRATOR_ENABLED: ${AI_ORCHESTRATOR_ENABLED:-true}
      AI_PROVIDER_DEEPSEEK_ENABLED: ${AI_PROVIDER_DEEPSEEK_ENABLED:-true}
      AI_PROVIDER_OPENAI_ENABLED: ${AI_PROVIDER_OPENAI_ENABLED:-true}
      AI_PROVIDER_GEMINI_PRIMARY_ENABLED: ${AI_PROVIDER_GEMINI_PRIMARY_ENABLED:-true}
      AI_PROVIDER_GEMINI_SECONDARY_ENABLED: ${AI_PROVIDER_GEMINI_SECONDARY_ENABLED:-true}
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-deepseek}
      AI_COMPLEX_PROVIDER: ${AI_COMPLEX_PROVIDER:-openai}
      AI_FALLBACK_CHAIN: ${AI_FALLBACK_CHAIN:-deepseek,openai,gemini_primary,gemini_secondary}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-30}
      AI_TOTAL_TIMEOUT_SECONDS: ${AI_TOTAL_TIMEOUT_SECONDS:-75}
      AI_MAX_RETRIES_PER_PROVIDER: ${AI_MAX_RETRIES_PER_PROVIDER:-1}
      AI_CIRCUIT_BREAKER_ENABLED: ${AI_CIRCUIT_BREAKER_ENABLED:-true}
      AI_RESPONSE_VALIDATION_ENABLED: ${AI_RESPONSE_VALIDATION_ENABLED:-true}
      AI_ALLOW_PROVIDER_RETRY: ${AI_ALLOW_PROVIDER_RETRY:-false}
      AI_COMPLEX_ROUTING_ENABLED: ${AI_COMPLEX_ROUTING_ENABLED:-true}
      AI_EXPENSIVE_MODEL_REQUIRES_COMPLEXITY: ${AI_EXPENSIVE_MODEL_REQUIRES_COMPLEXITY:-true}
      AI_MAX_CONTEXT_MESSAGES: ${AI_MAX_CONTEXT_MESSAGES:-20}
      AI_CONTEXT_SUMMARY_ENABLED: ${AI_CONTEXT_SUMMARY_ENABLED:-true}
      AI_CONTEXT_REDACTION_ENABLED: ${AI_CONTEXT_REDACTION_ENABLED:-true}
      COMMUNICATION_FALLBACK_ENABLED: ${COMMUNICATION_FALLBACK_ENABLED:-true}
      WHATSAPP_FALLBACK_ENABLED: ${WHATSAPP_FALLBACK_ENABLED:-true}
      TELEGRAM_FALLBACK_ENABLED: ${TELEGRAM_FALLBACK_ENABLED:-true}
      FALLBACK_WHEN_AI_UNCONFIGURED: ${FALLBACK_WHEN_AI_UNCONFIGURED:-true}
      FALLBACK_WHEN_AI_ERROR: ${FALLBACK_WHEN_AI_ERROR:-true}
      FALLBACK_WHEN_NO_ANSWER: ${FALLBACK_WHEN_NO_ANSWER:-true}
      FALLBACK_ESCALATE_TO_HUMAN: ${FALLBACK_ESCALATE_TO_HUMAN:-true}
      AI_LEARNING_ENABLED: ${AI_LEARNING_ENABLED:-true}
      AI_LEARNING_AUTO_PUBLISH: ${AI_LEARNING_AUTO_PUBLISH:-false}
      AI_LEARNING_REQUIRES_HUMAN_APPROVAL: ${AI_LEARNING_REQUIRES_HUMAN_APPROVAL:-true}
      HUMAN_ESCALATION_ENABLED: ${HUMAN_ESCALATION_ENABLED:-true}
      HUMAN_ESCALATION_AFTER_FALLBACK_COUNT: ${HUMAN_ESCALATION_AFTER_FALLBACK_COUNT:-2}
      HUMAN_ESCALATION_ON_USER_REQUEST: ${HUMAN_ESCALATION_ON_USER_REQUEST:-true}
      HUMAN_ESCALATION_ON_ALL_PROVIDERS_FAILED: ${HUMAN_ESCALATION_ON_ALL_PROVIDERS_FAILED:-true}
    networks:
      - lawim-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1024M
        reservations:
          cpus: '2'
          memory: 512M

  # PostgreSQL Database (Staging)
  postgres:
    image: postgres:15-alpine
    container_name: lawim-postgres-staging
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lawim
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lawim_staging
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
      - ./deployment/backup/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawim -d lawim_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lawim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Redis Cache (Staging)
  redis:
    image: redis:7-alpine
    container_name: lawim-redis-staging
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_staging:/data
    networks:
      - lawim-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  # Celery Worker (Staging)
  worker:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.worker
    container_name: lawim-worker-staging
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
    networks:
      - lawim-network
    depends_on:
      - redis
      - postgres
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Celery Beat Scheduler (Staging)
  scheduler:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.scheduler
    container_name: lawim-scheduler-staging
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
    networks:
      - lawim-network
    depends_on:
      - redis
      - postgres
    restart: always

  # Brain Service (Staging)
  brain:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.brain
    container_name: lawim-brain-staging
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Agents Service (Staging)
  agents:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.agents
    container_name: lawim-agents-staging
    ports:
      - "8002:8002"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Knowledge Service (Staging)
  knowledge:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.knowledge
    container_name: lawim-knowledge-staging
    ports:
      - "8003:8003"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Communication Service (Staging)
  communication:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.communication
    container_name: lawim-communication-staging
    ports:
      - "8004:8004"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Campay Payment Service (Staging)
  campay:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.campay
    container_name: lawim-campay-staging
    ports:
      - "8005:8005"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://lawim:${DB_PASSWORD}@postgres:5432/lawim_staging
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: staging
      CAMPAY_API_KEY: ${CAMPAY_API_KEY}
    networks:
      - lawim-network
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # Nginx Reverse Proxy (Staging)
  nginx:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.nginx
    container_name: lawim-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/conf.d/staging.conf:/etc/nginx/conf.d/default.conf
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - lawim-network
    depends_on:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  lawim-network:
    driver: bridge
