name: lawim-ci

on:
  push:
    branches: [main, develop, sprint/**, release/**]
  pull_request:
    branches: [main, develop, release/**]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: lawim-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Tests, schema and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Environment check
        run: ./infra/check-env.sh

      - name: Install optional PostgreSQL driver
        run: python3 -m pip install -r requirements-postgresql.txt

      - name: Full install validation
        run: ./scripts/validate-install.sh

      - name: Packaging validation
        run: ./scripts/validate-packaging.sh

      - name: Runtime smoke
        run: python3 scripts/smoke_runtime.py

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate canonical compose stacks
        run: |
          docker compose -f compose/docker-compose.base.yml -f compose/docker-compose.dev.yml config >/dev/null
          docker compose -f compose/docker-compose.base.yml -f compose/docker-compose.postgres.yml config >/dev/null
          docker compose -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.development.yml config >/dev/null
          docker compose -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.postgres.yml config >/dev/null

  postgres:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lawim
          POSTGRES_PASSWORD: lawim
          POSTGRES_DB: lawim_v2
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lawim -d lawim_v2"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL driver
        run: python3 -m pip install -r requirements-postgresql.txt

      - name: Run PostgreSQL integration tests
        env:
          PYTHONPATH: code:tests
          LAWIM_TEST_POSTGRES_URL: postgresql://lawim:lawim@localhost:5432/lawim_v2
        run: |
          python3 -m unittest tests.test_productization.PostgreSQLIntegrationTest -v
          python3 -m unittest tests.test_rc_postgresql -v
          python3 scripts/smoke_postgres.py
