version: "3.9"

x-lawim-compose-contract:
  project: LAWIM_V2
  compose_project_name: lawim_v2
  resource_prefix: lawim_v2
  environment_contract:
    APP_ENV: ${APP_ENV:-development}
    STACK_PROFILE: ${STACK_PROFILE:-development}
    LOG_LEVEL: ${LOG_LEVEL:-info}
    PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    SECRET_PROVIDER: ${SECRET_PROVIDER:-external}
  network_names:
    public: lawim_v2_public
    private: lawim_v2_private
  volume_names:
    state: lawim_v2_state
    shared: lawim_v2_shared
    cache: lawim_v2_cache

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: lawim_v2/app:local
    environment:
      APP_ENV: ${APP_ENV:-development}
      STACK_PROFILE: ${STACK_PROFILE:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      SECRET_PROVIDER: ${SECRET_PROVIDER:-external}
      LAWIM_HOST: 0.0.0.0
      LAWIM_PORT: 3000
      LAWIM_DB_PATH: /app/data/runtime/lawim.sqlite3
      LAWIM_SEED_DEMO_DATA: ${LAWIM_SEED_DEMO_DATA:-true}
      LAWIM_SESSION_TTL_SECONDS: ${LAWIM_SESSION_TTL_SECONDS:-604800}
    command: ["python", "-m", "lawim_v2"]
    ports:
      - "${LAWIM_APP_PORT:-3000}:3000"
    volumes:
      - lawim_state:/app/data/runtime
    networks:
      - lawim_public
      - lawim_private
    restart: unless-stopped
    init: true

networks:
  lawim_public:
    name: ${LAWIM_NETWORK_PUBLIC_NAME:-lawim_v2_public}
    driver: bridge
  lawim_private:
    name: ${LAWIM_NETWORK_PRIVATE_NAME:-lawim_v2_private}
    driver: bridge
    internal: true

volumes:
  lawim_state:
    name: ${LAWIM_VOLUME_STATE_NAME:-lawim_v2_state}
  lawim_shared:
    name: ${LAWIM_VOLUME_SHARED_NAME:-lawim_v2_shared}
  lawim_cache:
    name: ${LAWIM_VOLUME_CACHE_NAME:-lawim_v2_cache}
