version: "3.9"

x-lawim-profile-contract:
  profile: development
  purpose: local iteration and debugging
  environment_contract:
    APP_ENV: development
    STACK_PROFILE: development
    LOG_LEVEL: debug
    PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    SECRET_PROVIDER: ${SECRET_PROVIDER:-external}

services:
  app:
    environment:
      APP_ENV: development
      STACK_PROFILE: development
      LOG_LEVEL: debug
      LAWIM_SEED_DEMO_DATA: ${LAWIM_SEED_DEMO_DATA:-true}
    volumes:
      - ../code:/app/code
      - ../sitecustomize.py:/app/sitecustomize.py:ro
      - ../data/runtime:/app/data/runtime
